<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="X-ray structure refinement with electron density">
  <defs>
    <linearGradient id="tbg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1526"/>
      <stop offset="1" stop-color="#1a2440"/>
    </linearGradient>
    <linearGradient id="helix" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#tbg3)"/>

  <!-- alpha helix ribbon (stylized) -->
  <g fill="none" stroke="url(#helix)" stroke-width="16" stroke-linecap="round" opacity="0.9">
    <path d="M110 300 C 190 250, 150 190, 230 150 C 300 115, 270 70, 340 60"/>
  </g>
  <g fill="none" stroke="#0e7490" stroke-width="16" stroke-linecap="round" opacity="0.35">
    <path d="M130 305 C 210 255, 170 195, 250 155 C 320 120, 290 75, 360 65"/>
  </g>

  <!-- electron density mesh around ligand -->
  <g stroke="#4ade80" stroke-width="1.6" fill="none" opacity="0.7">
    <circle cx="450" cy="180" r="70"/>
    <circle cx="450" cy="180" r="50"/>
    <circle cx="450" cy="180" r="30"/>
    <path d="M380 180 h140 M450 110 v140 M400 130 l100 100 M500 130 l-100 100"/>
  </g>
  <!-- ligand (glutamate/modulator) sticks -->
  <g stroke="#f472b6" stroke-width="5" stroke-linecap="round">
    <line x1="430" y1="200" x2="455" y2="170"/><line x1="455" y1="170" x2="485" y2="185"/><line x1="455" y1="170" x2="450" y2="140"/>
  </g>
  <g fill="#fbcfe8">
    <circle cx="430" cy="200" r="7"/><circle cx="455" cy="170" r="7"/><circle cx="485" cy="185" r="7"/><circle cx="450" cy="140" r="7"/>
  </g>

  <text x="40" y="330" font-family="'Space Grotesk',sans-serif" font-size="24" font-weight="700" fill="#7dd3fc" opacity="0.9">GluA2-LBD · X-RAY REFINEMENT</text>
</svg>
