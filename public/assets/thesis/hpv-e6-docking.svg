<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Protein-ligand molecular docking">
  <defs>
    <linearGradient id="tbg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1526"/>
      <stop offset="1" stop-color="#1a2440"/>
    </linearGradient>
    <radialGradient id="prot" cx="0.45" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#tbg4)"/>

  <!-- protein blob with a binding pocket -->
  <path d="M150 180
           C 150 90, 260 60, 340 90
           C 430 55, 520 110, 500 190
           C 540 260, 450 320, 360 300
           C 300 340, 180 320, 160 250
           C 120 240, 120 200, 150 180 Z"
        fill="url(#prot)" stroke="#475569" stroke-width="2"/>
  <!-- pocket cavity -->
  <ellipse cx="360" cy="190" rx="70" ry="55" fill="#0e1526" opacity="0.8"/>

  <!-- docked ligand (green sticks) -->
  <g stroke="#4ade80" stroke-width="6" stroke-linecap="round">
    <line x1="330" y1="205" x2="360" y2="175"/><line x1="360" y1="175" x2="395" y2="190"/>
    <line x1="360" y1="175" x2="358" y2="140"/><line x1="395" y1="190" x2="420" y2="170"/>
  </g>
  <g fill="#bbf7d0">
    <circle cx="330" cy="205" r="8"/><circle cx="360" cy="175" r="8"/><circle cx="395" cy="190" r="8"/><circle cx="358" cy="140" r="8"/><circle cx="420" cy="170" r="8"/>
  </g>
  <!-- H-bonds (dashed) to pocket residues -->
  <g stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="4 5" opacity="0.9">
    <line x1="330" y1="205" x2="300" y2="230"/>
    <line x1="420" y1="170" x2="450" y2="150"/>
    <line x1="358" y1="140" x2="360" y2="105"/>
  </g>
  <g fill="#f87171">
    <circle cx="300" cy="230" r="6"/><circle cx="450" cy="150" r="6"/><circle cx="360" cy="105" r="6"/>
  </g>

  <text x="40" y="335" font-family="'Space Grotesk',sans-serif" font-size="24" font-weight="700" fill="#4ade80" opacity="0.9">HPV E6 · MOLECULAR DOCKING</text>
</svg>
