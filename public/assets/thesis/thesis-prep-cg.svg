<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Coarse-grained simulation box">
  <defs>
    <linearGradient id="tbg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1526"/>
      <stop offset="1" stop-color="#1a2440"/>
    </linearGradient>
    <linearGradient id="cgb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="cgg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#tbg2)"/>

  <!-- periodic simulation box (isometric cube) -->
  <g stroke="#38bdf8" stroke-width="2.5" fill="none" opacity="0.7">
    <path d="M150 130 L420 130 L490 90 L220 90 Z"/>
    <path d="M150 130 L150 300 L420 300 L420 130"/>
    <path d="M420 130 L490 90 L490 260 L420 300"/>
    <path d="M150 300 L220 260 L490 260 M220 260 L220 90" stroke-opacity="0.4"/>
  </g>

  <!-- CG chains inside the box -->
  <g stroke="#2dd4bf" stroke-width="5" stroke-linecap="round" opacity="0.8">
    <line x1="195" y1="200" x2="250" y2="175"/><line x1="250" y1="175" x2="305" y2="205"/><line x1="305" y1="205" x2="360" y2="180"/>
    <line x1="215" y1="255" x2="275" y2="240"/><line x1="275" y1="240" x2="330" y2="260"/>
  </g>
  <g fill="url(#cgb)">
    <circle cx="195" cy="200" r="15"/><circle cx="250" cy="175" r="15"/><circle cx="305" cy="205" r="15"/><circle cx="360" cy="180" r="15"/>
    <circle cx="215" cy="255" r="14"/><circle cx="275" cy="240" r="14"/><circle cx="330" cy="260" r="14"/>
  </g>
  <g fill="url(#cgg)">
    <circle cx="252" cy="128" r="12"/><circle cx="332" cy="150" r="12"/>
  </g>

  <text x="40" y="335" font-family="'Space Grotesk',sans-serif" font-size="24" font-weight="700" fill="#7dd3fc" opacity="0.9">CG MODEL · SELF-ASSEMBLY (HPC)</text>
</svg>
