<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Atomistic to coarse-grained mapping">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1526"/>
      <stop offset="1" stop-color="#1a2440"/>
    </linearGradient>
    <linearGradient id="beadm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg4)"/>

  <!-- left: atomistic (small atoms + bonds) -->
  <g stroke="#64748b" stroke-width="3" opacity="0.85">
    <line x1="90" y1="150" x2="130" y2="110"/><line x1="130" y1="110" x2="175" y2="140"/>
    <line x1="175" y1="140" x2="160" y2="195"/><line x1="160" y1="195" x2="110" y2="205"/>
    <line x1="110" y1="205" x2="90" y2="150"/><line x1="175" y1="140" x2="220" y2="120"/>
    <line x1="160" y1="195" x2="205" y2="225"/>
  </g>
  <g fill="#cbd5e1">
    <circle cx="90" cy="150" r="10"/><circle cx="130" cy="110" r="10"/><circle cx="175" cy="140" r="10"/>
    <circle cx="160" cy="195" r="10"/><circle cx="110" cy="205" r="10"/>
  </g>
  <g fill="#7dd3fc">
    <circle cx="220" cy="120" r="9"/><circle cx="205" cy="225" r="9"/>
  </g>
  <circle cx="150" cy="160" r="95" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- mapping arrow -->
  <g>
    <line x1="285" y1="170" x2="365" y2="170" stroke="#2dd4bf" stroke-width="6" stroke-linecap="round"/>
    <path d="M360 155 L390 170 L360 185 Z" fill="#2dd4bf"/>
    <text x="278" y="140" font-family="'Space Grotesk',sans-serif" font-size="18" font-weight="600" fill="#94a3b8">map</text>
  </g>

  <!-- right: coarse-grained beads -->
  <g stroke="#14b8a6" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <line x1="470" y1="150" x2="540" y2="130"/>
    <line x1="470" y1="150" x2="475" y2="215"/>
  </g>
  <circle cx="470" cy="150" r="30" fill="url(#beadm)"/>
  <circle cx="540" cy="130" r="26" fill="url(#beadm)"/>
  <circle cx="475" cy="215" r="24" fill="url(#beadm)"/>
  <g fill="#ffffff" opacity="0.35">
    <circle cx="461" cy="141" r="8"/><circle cx="532" cy="122" r="7"/><circle cx="467" cy="207" r="6"/>
  </g>

  <text x="40" y="325" font-family="'Space Grotesk',sans-serif" font-size="26" font-weight="700" fill="#5eead4" opacity="0.9">CG-MAPPER</text>
</svg>
